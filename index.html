<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>milesOS</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.rawgit.com/dreampulse/computer-modern-web-font/master/fonts.css"
    />
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <!--TOP BAR-->
    <div class="topbar">
      <p
        class="topbar-brand"
        title="Open welcome window"
        onclick="WindowManager.open('welcome')"
      >
        milesOS
      </p>
      <div class="dog-walk" aria-hidden="true">
        <div class="dog-walk__strip"></div>
      </div>
      <p id="timeElement" class="topbar-time">Time</p>
    </div>

    <script>
      function updateTime() {
        var currentTime = new Date().toLocaleString();
        var timeText = document.querySelector("#timeElement");
        timeText.innerHTML = currentTime;
      }
      setInterval(updateTime, 1000);
    </script>

    <!--WELCOME WINDOW-->
    <div
      id="welcome"
      class="window"
      data-window
      style="top: 50%; left: 50%; transform: translate(-50%, -50%)"
    >
      <div class="window__titlebar" aria-label="Drag to move window">
        <div class="tl-group">
          <button
            class="tl tl--close"
            data-action="close"
            aria-label="Close"
          ></button>
          <button
            class="tl tl--min"
            data-action="minimize"
            aria-label="Minimize"
          ></button>
          <button
            class="tl tl--max"
            data-action="maximize"
            aria-label="Maximize"
          ></button>
        </div>
      </div>

      <div class="window__body">
        <img
          class="welcome-avatar"
          src="assets/6f04d948-bb0a-44b6-8aa4-a78ecc70f756.jpg"
        />

        <h1 class="welcome-heading">milesOS</h1>

        <p class="welcome-lede">
          A website which should introduce you to me, hopefully!
        </p>

        <p>A scene from my favorite movie (Ocean's 11)</p>

        <img
          class="welcome-media"
          src="assets/emp-oceans-11.gif"
          alt="my favorite movie"
        />

        <p></p>

        <a
          href="https://open.spotify.com/playlist/37i9dQZF1F5p3rmiWPIYgZ?si=26af273779d342d2"
          >My Liked Songs (Spotify)</a
        >
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
