<!doctype html>
<html>
  <body
    style="
      background-color: #ffffff;
      background-image: url(assets/555462856_25639402368981613_6079599269604147602_n.png);
      background-size: cover;
      height: 100vh;
      background-position: center;
    "
  >
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.rawgit.com/dreampulse/computer-modern-web-font/master/fonts.css"
    />
    <style>
      body {
        font-family: "Computer Modern Sans", sans-serif;
      }

      .dog-walk {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        height: 1.5em;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        pointer-events: none;
      }
      .dog-walk__strip {
        width: 400%;
        height: 100%;
        background-image: url(assets/dog_walk.png);
        background-repeat: no-repeat;
        background-size: 100% 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        animation: dog-walk-cycle 0.55s steps(4) infinite;
      }
      @keyframes dog-walk-cycle {
        from {
          transform: translateX(-75%);
        }
        to {
          transform: translateX(25%);
        }
      }

      .window {
        position: absolute;
        background: rgb(254, 254, 254);
        border-radius: 10px;
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.18),
          0 12px 40px rgba(0, 0, 0, 0.3);
      }
      .window__titlebar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        height: 28px;
        background: linear-gradient(to bottom, #ececec, #d5d5d5);
        border-bottom: 1px solid rgba(0, 0, 0, 0.12);
        user-select: none;
      }
      .window__body {
        padding: 14px 20px 20px;
      }
      .tl-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tl {
        position: relative;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: none;
        padding: 0;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.2);
        flex-shrink: 0;
      }
      .tl:active {
        transform: scale(0.92);
      }
      .tl--close {
        background: #ff5f57;
      }
      .tl--min {
        background: #febc2e;
      }
      .tl--max {
        background: #28c840;
      }

      /* macOS-style traffic-light glyphs that appear on group hover. */
      .tl::before {
        content: "";
        position: absolute;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.6);
        -webkit-mask-image: var(--tl-icon);
        mask-image: var(--tl-icon);
        -webkit-mask-size: 12px 12px;
        mask-size: 12px 12px;
        -webkit-mask-position: center;
        mask-position: center;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        opacity: 0;
        pointer-events: none;
      }
      .tl-group:hover .tl::before,
      .tl-group--force-hover .tl::before {
        opacity: 1;
      }
      .tl--close {
        --tl-icon: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3.6 3.6L8.4 8.4M8.4 3.6L3.6 8.4' stroke='black' stroke-width='1.5' stroke-linecap='round' fill='none'/></svg>");
      }
      .tl--min {
        --tl-icon: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 6L9 6' stroke='black' stroke-width='1.5' stroke-linecap='round' fill='none'/></svg>");
      }
      .tl--max {
        --tl-icon: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 3L7 3L3 7Z M9 9L5 9L9 5Z' fill='black'/></svg>");
      }

      .topbar-brand {
        margin-left: 16px;
        cursor: pointer;
        user-select: none;
      }
      .topbar-brand:hover {
        opacity: 0.85;
      }
    </style>

    <!--TOP BAR-->
    <div
      style="
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        align-items: center;
        backdrop-filter: blur(10px);
        background-color: rgba(0, 0, 0, 0.25);
        color: #fff;
        justify-content: space-between;
        z-index: 9999;
      "
    >
      <p
        class="topbar-brand"
        title="Open welcome window"
        onclick="WindowManager.open('welcome')"
      >
        milesOS
      </p>
      <div class="dog-walk" aria-hidden="true">
        <div class="dog-walk__strip"></div>
      </div>
      <p id="timeElement" style="margin-right: 16px">Time</p>
    </div>

    <script>
      function updateTime() {
        var currentTime = new Date().toLocaleString();
        var timeText = document.querySelector("#timeElement");
        timeText.innerHTML = currentTime;
      }
      setInterval(updateTime, 1000);
    </script>

    <!--WELCOME WINDOW-->
    <div
      id="welcome"
      class="window"
      data-window
      style="top: 50%; left: 50%; transform: translate(-50%, -50%)"
    >
      <div class="window__titlebar" aria-label="Drag to move window">
        <div class="tl-group">
          <button
            class="tl tl--close"
            data-action="close"
            aria-label="Close"
          ></button>
          <button
            class="tl tl--min"
            data-action="minimize"
            aria-label="Minimize"
          ></button>
          <button
            class="tl tl--max"
            data-action="maximize"
            aria-label="Maximize"
          ></button>
        </div>
      </div>

      <div class="window__body">
        <img
          style="
            border-radius: 100px;
            object-fit: cover;
            width: 50px;
            height: 50px;
          "
          src="assets/6f04d948-bb0a-44b6-8aa4-a78ecc70f756.jpg"
        />

        <h1 style="margin-top: -8px; margin-bottom: -8px">milesOS</h1>

        <p style="margin-top: 0px">
          A website which should introduce you to me, hopefully!
        </p>

        <p>A scene from my favorite movie (Ocean's 11)</p>

        <img
          style="border-radius: 16px; object-fit: cover"
          src="assets/emp-oceans-11.gif"
          alt="my favorite movie"
        />

        <p></p>

        <a
          href="https://open.spotify.com/playlist/37i9dQZF1F5p3rmiWPIYgZ?si=26af273779d342d2"
          >My Liked Songs (Spotify)</a
        >
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
